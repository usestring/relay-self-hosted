services:
  caddy:
    image: caddy:2-alpine
    environment:
      - API_DOMAIN=${API_DOMAIN}
      - AUTH_DOMAIN=${AUTH_DOMAIN}
      - RELAY_DOMAIN=${RELAY_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      token-service:
        condition: service_started
      pocketbase:
        condition: service_healthy
      relay-server:
        condition: service_started
    restart: unless-stopped

  relay-server:
    image: docker.system3.md/relay-server
    expose:
      - "8080"
    volumes:
      - ./relay.toml:/app/relay.toml:ro
      - ./data:/app/data
    restart: unless-stopped

  token-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci --omit=dev --silent && node src/index.js"
    expose:
      - "3000"
    volumes:
      - ./token-service:/app
      - ./relay.toml:/relay.toml:ro
    environment:
      - RELAY_TOML=/relay.toml
      - RELAY_URL=http://relay-server:8080
      - RELAY_SERVER_AUTH=${RELAY_SERVER_AUTH:-}
      - POCKETBASE_URL=http://pocketbase:8090
      - PORT=3000
    depends_on:
      relay-server:
        condition: service_started
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.22.21
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "pocketbase migrate up --dir /pb/pb_data --migrationsDir /pb/pb_migrations &&
      pocketbase serve --http=0.0.0.0:8090 --dir /pb/pb_data
      --migrationsDir /pb/pb_migrations --hooksDir /pb/pb_hooks"
    expose:
      - "8090"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations:ro
      - ./pb_hooks:/pb/pb_hooks:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
