services:
  relay-server:
    image: docker.system3.md/relay-server
    ports:
      - "8080:8080"
    volumes:
      - ./relay.toml:/app/relay.toml
      - ./data:/app/data
    restart: unless-stopped

  token-service:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --silent && node src/index.js"
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./token-service:/app
      - ./relay.toml:/relay.toml
    environment:
      - RELAY_TOML=/relay.toml
      - RELAY_URL=http://relay-server:8080
      - RELAY_SERVER_AUTH=${RELAY_SERVER_AUTH:-}
      - POCKETBASE_URL=http://pocketbase:8090
      - PORT=3000
    depends_on:
      relay-server:
        condition: service_started
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  pocketbase:
    # Pinned: the control-plane migrations + self-host hook target the
    # PocketBase v0.22.x JS API (Dao/Collection/SchemaField, $app.dao()).
    # v0.23+ rewrote that API, so do not float to :latest without porting
    # pb_migrations/ and pb_hooks/ first.
    image: ghcr.io/muchobien/pocketbase:0.22.21
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "pocketbase migrate up --dir /pb/pb_data --migrationsDir /pb/pb_migrations &&
      pocketbase serve --http=0.0.0.0:8090 --dir /pb/pb_data
      --migrationsDir /pb/pb_migrations --hooksDir /pb/pb_hooks"
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
      - ./pb_hooks:/pb/pb_hooks
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
